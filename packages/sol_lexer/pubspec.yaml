name: sol_lexer
description: >
  Solidity tokeniser / scanner for the sol_pkgs compiler.
  Produces a stream of typed tokens from raw Solidity source text.
version: 0.1.0+1
repository: https://github.com/normidar/sol_pkgs/tree/main/packages/sol_lexer

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  sol_support: ^0.1.0+1

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
