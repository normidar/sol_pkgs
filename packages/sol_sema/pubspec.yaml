name: sol_sema
description: >
  Semantic analysis for the sol_pkgs Solidity compiler.
  Name resolution, scope management, C3 inheritance linearisation, and type checking.
version: 0.1.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  sol_support: ^0.1.0+1
  sol_ast: ^0.1.0+1
  sol_types: ^0.1.0+1

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
