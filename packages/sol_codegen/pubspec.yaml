name: sol_codegen
description: >
  Lowers semantically-analysed Solidity AST to Yul IR for the sol_pkgs compiler.
version: 0.1.0

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  sol_support: any
  sol_ast: any
  sol_types: any
  sol_yul: any
  sol_abi: any

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
