name: sol_web3
description: >
  Pure-Dart Ethereum JSON-RPC client, transaction signing (secp256k1/ECDSA,
  RLP), and contract deployment for the sol_pkgs Solidity compiler. The
  "last mile" that turns compiled bytecode into a transaction on a real
  chain — no solc, no web3.js, no Node.js.
version: 0.1.1
repository: https://github.com/normidar/sol_pkgs/tree/main/packages/sol_web3

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  sol_support: ^0.1.0+1

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
  sol_driver: ^0.1.1
