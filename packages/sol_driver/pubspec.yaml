name: sol_driver
description: >
  Compiler orchestration and standard-JSON I/O for the sol_pkgs Solidity compiler.
  Equivalent to solc's CompilerStack.
version: 0.1.0

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  sol_support: any
  sol_lexer:
    path: ../sol_lexer
  sol_ast: any
  sol_parser:
    path: ../sol_parser
  sol_types: any
  sol_sema:
    path: ../sol_sema
  sol_codegen:
    path: ../sol_codegen
  sol_evm:
    path: ../sol_evm
  sol_yul: any
  sol_abi: any

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
