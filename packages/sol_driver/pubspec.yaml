name: sol_driver
description: >
  Compiler orchestration and standard-JSON I/O for the sol_pkgs Solidity compiler.
  Equivalent to solc's CompilerStack.
version: 0.1.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  sol_support: ^0.1.0+1
  sol_lexer: ^0.1.0+1
  sol_ast: ^0.1.0+1
  sol_parser: ^0.1.0+1
  sol_types: ^0.1.0+1
  sol_sema: ^0.1.0+1
  sol_codegen: ^0.1.0+1
  sol_evm: ^0.1.0+1
  sol_yul: ^0.1.0+1
  sol_abi: ^0.1.0+1

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
