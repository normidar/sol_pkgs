name: sol_parser
description: >
  Recursive-descent Solidity parser for the sol_pkgs compiler.
  Converts a token stream into a typed AST.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  sol_support:
    path: ../sol_support
  sol_lexer:
    path: ../sol_lexer
  sol_ast:
    path: ../sol_ast

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
