name: sol_pkgs

packages:
  - packages/*

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  analyze:
    run: melos exec -- dart analyze .
    description: Run dart analyze on all packages.

  format:
    run: melos exec -- dart format .
    description: Run dart format on all packages.

  test:
    run: melos exec -- dart test
    description: Run tests on all packages.
    packageFilters:
      dirExists: test

  test:coverage:
    run: melos exec -- dart test --coverage=coverage
    description: Run tests with coverage on all packages.
    packageFilters:
      dirExists: test

  lint:
    run: melos run analyze && melos run format
    description: Run analyze and format on all packages.
